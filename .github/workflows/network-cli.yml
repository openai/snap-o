name: Network CLI

on:
  push:
    branches: [main, master]
    paths:
      - 'scripts/snapo'
      - 'tests/snapo_cli/**'
      - 'contracts/network/**'
      - '.github/workflows/network-cli.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'scripts/snapo'
      - 'tests/snapo_cli/**'
      - 'contracts/network/**'
      - '.github/workflows/network-cli.yml'

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-22.04, ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check Python CLI
        run: python3 -m py_compile scripts/snapo tests/snapo_cli/test_snapo.py
      - name: Test Python CLI
        run: python3 -m unittest discover -s tests/snapo_cli -p 'test_*.py' -v
      - name: Smoke test command surface
        run: |
          test -x scripts/snapo
          scripts/snapo --help
          scripts/snapo network list --help
          scripts/snapo network requests --help
          scripts/snapo network show --help
