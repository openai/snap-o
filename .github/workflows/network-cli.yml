name: Network CLI

on:
  push:
    branches: [main, master]
    paths:
      - 'skills/snap-o-network-inspector/**'
      - 'tests/snapo_cli/**'
      - 'contracts/network/**'
      - '.github/workflows/network-cli.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'skills/snap-o-network-inspector/**'
      - 'tests/snapo_cli/**'
      - 'contracts/network/**'
      - '.github/workflows/network-cli.yml'

permissions:
  contents: read

env:
  SNAPO_CLI: skills/snap-o-network-inspector/scripts/snapo

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-22.04, ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check Python CLI
        run: python3 -m py_compile "$SNAPO_CLI" tests/snapo_cli/test_snapo.py
      - name: Test Python CLI
        run: python3 -m unittest discover -s tests/snapo_cli -p 'test_*.py' -v
      - name: Smoke test command surface
        run: |
          test -x "$SNAPO_CLI"
          "$SNAPO_CLI" --help
          "$SNAPO_CLI" network list --help
          "$SNAPO_CLI" network requests --help
          "$SNAPO_CLI" network show --help
