name: Android Inspector

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'snapo-desktop-compose/**'
      - '.github/workflows/android-inspector.yml'
      - 'VERSION'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'snapo-desktop-compose/**'
      - '.github/workflows/android-inspector.yml'
      - 'VERSION'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@4c125117fe7c5aed11272ec4213f602f012f89f2  # v5
      - name: Grant execute permission for Gradle wrapper
        working-directory: snapo-desktop-compose
        run: chmod +x gradlew
      - name: Build Android Inspector
        working-directory: snapo-desktop-compose
        run: ./gradlew --no-daemon build

  detekt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@4c125117fe7c5aed11272ec4213f602f012f89f2  # v5
      - name: Grant execute permission for Gradle wrapper
        working-directory: snapo-desktop-compose
        run: chmod +x gradlew
      - name: Run Detekt
        working-directory: snapo-desktop-compose
        run: ./gradlew --no-daemon detekt
