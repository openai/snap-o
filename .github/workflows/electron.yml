name: Electron

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'snapo-desktop-electron/**'
      - '.github/workflows/electron.yml'
      - 'VERSION'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'snapo-desktop-electron/**'
      - '.github/workflows/electron.yml'
      - 'VERSION'

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: snapo-desktop-electron/package-lock.json
      - name: Install dependencies
        working-directory: snapo-desktop-electron
        run: |
          if grep -q 'socket-firewall-registry\.gateway\.' package-lock.json; then
            echo "::error::package-lock.json contains an internal npm registry URL"
            exit 1
          fi
          npm ci
      - name: Check formatting
        working-directory: snapo-desktop-electron
        run: npm run format:check
      - name: Lint
        working-directory: snapo-desktop-electron
        run: npm run lint
      - name: Typecheck
        working-directory: snapo-desktop-electron
        run: npm run typecheck
      - name: Build
        working-directory: snapo-desktop-electron
        run: npm run build
