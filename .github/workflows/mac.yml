name: Mac

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'snapo-app-mac/**'
      - 'snapo-network-inspector-web/**'
      - 'contracts/network/**'
      - '.github/workflows/mac.yml'
      - 'VERSION'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'snapo-app-mac/**'
      - 'snapo-network-inspector-web/**'
      - 'contracts/network/**'
      - '.github/workflows/mac.yml'
      - 'VERSION'

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: snapo-network-inspector-web/package-lock.json
      - name: Install dependencies
        working-directory: snapo-network-inspector-web
        run: npm ci
      - name: Check formatting
        working-directory: snapo-network-inspector-web
        run: npm run format:check
      - name: Lint
        working-directory: snapo-network-inspector-web
        run: npm run lint
      - name: Typecheck
        working-directory: snapo-network-inspector-web
        run: npm run typecheck
      - name: Test
        working-directory: snapo-network-inspector-web
        run: npm test
      - name: Build
        working-directory: snapo-network-inspector-web
        run: npm run build

  build:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: snapo-network-inspector-web/package-lock.json
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: '26.1.1'
      - name: Expose setup-node to the Xcode web UI build phase
        run: |
          set -euo pipefail
          SNAPO_NODE_BIN_DIR=$(dirname "$(command -v node)")
          echo "SNAPO_NODE_BIN_DIR=${SNAPO_NODE_BIN_DIR}" >> "$GITHUB_ENV"
      - name: Test shared device client
        working-directory: snapo-app-mac/SnapODeviceClient
        run: swift test
      - name: Build Snap-O
        working-directory: snapo-app-mac
        run: |
          set -o pipefail
          xcodebuild -project Snap-O.xcodeproj \
                     -scheme Snap-O \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     build

  style:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
      - name: Set up mise
        working-directory: snapo-app-mac
        run: ./scripts/ci-install-mise.sh
      - name: Install tools
        working-directory: snapo-app-mac
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mise trust --quiet
          mise install
      - name: SwiftFormat
        working-directory: snapo-app-mac
        run: mise exec -- swiftformat . --lint --config .swiftformat --reporter github-actions-log
      - name: SwiftLint
        working-directory: snapo-app-mac
        run: mise exec -- swiftlint lint --strict --no-cache --reporter github-actions-logging
